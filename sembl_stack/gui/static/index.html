<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>sembl</title>
<link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
<div class="app">

  <div class="top">
    <span class="brand">sembl</span>
    <span class="repo" id="repo-name">&mdash;</span>
    <span class="spacer"></span>
    <button class="tbtn primary" id="new-run-btn" type="button">New run</button>
  </div>

  <div class="cols">

    <aside class="side">
      <div class="hd">Runs</div>
      <div id="run-list"></div>
    </aside>

    <section class="convo">
      <div class="thread" id="thread"></div>
      <div class="composer">
        <textarea
          id="composer-input"
          rows="1"
          placeholder="Describe a change &mdash; the loop plans bounds, builds in a sandbox, and the gate judges it."
        ></textarea>
      </div>
    </section>

    <aside class="preview">
      <div class="bar">
        <span class="live-dot" id="preview-dot"></span>
        <span class="url" id="preview-url">&mdash;</span>
        <span class="attempt" id="preview-attempt"></span>
      </div>
      <div class="page" id="preview-page">
        <div class="preview-empty" id="preview-empty">Select a run to view evidence.</div>
        <iframe id="preview-frame" class="hidden" title="stage preview"></iframe>
      </div>
      <div class="foot" id="preview-foot"></div>
    </aside>

  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
