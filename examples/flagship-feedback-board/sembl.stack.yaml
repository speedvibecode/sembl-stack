layers:
  spec: sembl
  execute: mock
  sandbox: worktree
  verify: sembl
  deploy: vercel
  postdeploy: http

transport:
  spec: mcp
  verify: mcp
  mcp_server: ["uvx", "--from", "sembl[mcp]", "sembl-mcp"]

loop:
  max_attempts: 2
  strict: true

tracing:
  langfuse: false

options:
  postdeploy:
    health_path: /api/health
    # A 2xx alone isn't enough: assert the app's own health contract (src/app/api/health/route.ts)
    # so a 200 with supabaseConfigured:false is BLOCKed, not passed.
    expect_json:
      ok: true
      supabaseConfigured: true
