layers:
  spec: sembl
  execute: mock
  sandbox: worktree
  verify: sembl
  deploy: vercel
  postdeploy: http
  stage: web

# SPEC-stage live-proof (2026-07-12): deps into every attempt clone, then a live
# per-attempt preview whose rendered DOM lands in the run record.
sandbox:
  prepare: "npm ci"
  timeout_s: 900

stage:
  serve: "npm run dev -- -p {port}"
  ready: "http://127.0.0.1:{port}/"
  routes: ["/"]
  ready_timeout_s: 180

transport:
  spec: mcp
  verify: mcp
  mcp_server: ["uvx", "--from", "sembl[mcp]", "sembl-mcp"]

loop:
  max_attempts: 2
  strict: true

tracing:
  langfuse: false

options:
  postdeploy:
    health_path: /api/health
    # A 2xx alone isn't enough: assert the app's own health contract (src/app/api/health/route.ts)
    # so a 200 with supabaseConfigured:false is BLOCKed, not passed.
    expect_json:
      ok: true
      supabaseConfigured: true
