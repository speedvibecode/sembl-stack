[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "sembl-stack"
version = "0.0.1"
description = "An open, swappable spec-driven coding factory: Spec Kit plans, an agent writes, a sandbox contains, Sembl gates."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = [
  "click>=8.1",
  "pyyaml>=6.0",
]

[project.optional-dependencies]
# The gate (L5) + spec engine (L2). Reached over MCP, but the CLI fallback uses this.
gate = ["sembl>=0.1.18"]
mcp = ["mcp>=1.0"]
orchestrate = ["langgraph>=0.2"]
trace = ["langfuse>=2.0"]
# Everything, for the full reference factory.
all = ["sembl>=0.1.18", "mcp>=1.0", "langgraph>=0.2", "langfuse>=2.0"]

[project.scripts]
sembl-stack = "sembl_stack.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["sembl_stack"]
